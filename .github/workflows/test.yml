name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: rm package-lock.json && npm install

      - name: Run tests
        id: tests
        run: |
          npm test 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.existsSync('test-output.txt')
              ? fs.readFileSync('test-output.txt', 'utf8')
              : 'No test output (tests did not run)';
            const passed = '${{ steps.tests.outputs.exit_code }}' === '0';

            // Extract summary line (e.g. "Tests  194 passed (194)")
            const summaryMatch = output.match(/Tests\s+.*/);
            const summary = summaryMatch ? summaryMatch[0].trim() : '';

            const icon = passed ? '✅' : '❌';
            const status = passed ? 'passed' : 'failed';

            const body = [
              `## ${icon} API Tests ${status}`,
              '',
              summary ? `\`${summary}\`` : '',
              '',
              '<details>',
              '<summary>Full output</summary>',
              '',
              '```',
              output.slice(-3000),
              '```',
              '</details>',
            ].join('\n');

            // Delete previous bot comments to avoid spam
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments) {
              if (comment.user.type === 'Bot' && comment.body.includes('API Tests')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
