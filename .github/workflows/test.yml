name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: API Tests
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Uses `npm install` (not `npm ci`): the committed lockfile drifts across
        # npm versions for several optional transitive deps, so `npm ci`'s strict
        # sync check fails on CI's npm. `rm` forces a clean resolve incl. the
        # Linux rolldown binding vitest needs at runtime.
        run: rm package-lock.json && npm install

      - name: Run tests
        id: tests
        continue-on-error: true
        # One run covers both projects (node + dom) — see vitest.config.ts.
        run: npx vitest run --reporter=json --outputFile=test-results.json

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { run } = require('./.github/scripts/pr-test-comment.js');
            await run({ github, context });

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
