name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # Uses `npm install` (not `npm ci`): the committed lockfile drifts across
        # npm versions for several optional transitive deps, so `npm ci`'s strict
        # sync check fails on CI's npm. `rm` forces a clean resolve incl. the
        # Linux rolldown binding vitest needs at runtime.
        run: rm package-lock.json && npm install

      - name: Run tests
        id: tests
        continue-on-error: true
        run: |
          npx vitest run --reporter=json --outputFile=test-results.json &
          PID1=$!
          npx vitest run --config vitest.config.hooks.ts --reporter=json --outputFile=test-results-hooks.json &
          PID2=$!
          FAIL=0
          wait $PID1 || FAIL=1
          wait $PID2 || FAIL=1
          exit $FAIL

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── Parse and merge test results ──
            let results = null;
            let passed = false;
            const files = ['test-results.json', 'test-results-hooks.json'];
            for (const file of files) {
              if (!fs.existsSync(file)) continue;
              try {
                const r = JSON.parse(fs.readFileSync(file, 'utf8'));
                if (!results) {
                  results = r;
                } else {
                  results.testResults = [...(results.testResults || []), ...(r.testResults || [])];
                  results.numTotalTests = (results.numTotalTests || 0) + (r.numTotalTests || 0);
                  results.numPassedTests = (results.numPassedTests || 0) + (r.numPassedTests || 0);
                  results.numFailedTests = (results.numFailedTests || 0) + (r.numFailedTests || 0);
                  results.success = results.success && r.success;
                }
              } catch {}
            }
            if (results) passed = results.success;

            const icon = passed ? '✅' : '❌';
            const status = passed ? 'passed' : 'failed';

            // ── Build summary + tables ──
            // The per-file table is ~180 rows, which made every PR comment a
            // wall of text. Keep a one-line summary visible, collapse the full
            // table behind a <details>, and surface only failing files inline.
            const HEADER = '| | File | Passed | Failed | Duration |';
            const DIVIDER = '|---|------|--------|--------|----------|';

            let summaryLine = '';
            let failedTable = '';
            let detailsBlock = '';

            if (results?.testResults) {
              const toRow = f => {
                const name = f.name.replace(/^.*src\/test\//, '');
                const total = f.assertionResults?.length ?? 0;
                const pass = f.assertionResults?.filter(t => t.status === 'passed').length ?? 0;
                const fail = total - pass;
                const duration = ((f.endTime - f.startTime) / 1000).toFixed(2);
                return `| ${fail > 0 ? '❌' : '✅'} | \`${name}\` | ${pass} | ${fail} | ${duration}s |`;
              };
              const hasFailures = f =>
                (f.assertionResults?.filter(t => t.status !== 'passed').length ?? 0) > 0;

              const rows = results.testResults.map(toRow);
              const failedRows = results.testResults.filter(hasFailures).map(toRow);

              const passedTests = results.numPassedTests ?? 0;
              const failedTests = results.numFailedTests ?? 0;
              const fileCount = results.testResults.length;
              const totalDuration = results.testResults
                .reduce((sum, f) => sum + (f.endTime - f.startTime), 0) / 1000;

              summaryLine = `**${passedTests}** passed · **${failedTests}** failed · ${fileCount} files · ${totalDuration.toFixed(2)}s`;

              if (failedRows.length) {
                failedTable = ['', '### Failed files', '', HEADER, DIVIDER, ...failedRows].join('\n');
              }

              detailsBlock = [
                '',
                `<details><summary>Per-file results (${fileCount} files)</summary>`,
                '',
                HEADER,
                DIVIDER,
                ...rows,
                `| | **Total** | **${passedTests}** | **${failedTests}** | **${totalDuration.toFixed(2)}s** |`,
                '',
                '</details>',
              ].join('\n');
            }

            // ── Fetch all PR comments once ──
            const { data: allComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // ── Get Vercel deployment info from bot comment ──
            let vercelSection = '';
            try {
              const vcComment = allComments.find(c =>
                c.user.login === 'vercel[bot]' && c.body.includes('[vc]')
              );
              if (vcComment) {
                const b64Match = vcComment.body.match(/\[vc\]:\s*#[^:]+:(\S+)/);
                if (b64Match) {
                  const data = JSON.parse(Buffer.from(b64Match[1], 'base64').toString());
                  const project = data.projects?.[0];
                  if (project) {
                    const previewUrl = `https://${project.previewUrl}`;
                    const inspectorUrl = project.inspectorUrl;
                    vercelSection = [
                      '',
                      '### Deployment',
                      '',
                      '| | |',
                      '|---|---|',
                      `| **Preview** | [${project.previewUrl}](${previewUrl}) |`,
                      `| **Inspect** | [View on Vercel](${inspectorUrl}) |`,
                      '',
                    ].join('\n');
                  }
                }
              }
            } catch {}

            // ── Compose comment ──
            const MARKER = '<!-- studioblack-test-results -->';
            const body = [
              MARKER,
              `## ${icon} Tests ${status}`,
              '',
              summaryLine,
              vercelSection,
              failedTable,
              detailsBlock,
              '',
            ].join('\n');

            // ── Upsert: update existing comment or create new one ──
            const existing = allComments.find(c =>
              c.user.type === 'Bot' &&
              (c.body.includes(MARKER) || c.body.includes('## ') && c.body.includes('Tests'))
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1
