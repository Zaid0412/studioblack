name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: rm package-lock.json && npm install

      - name: Run tests
        id: tests
        run: |
          npx vitest run --reporter=json --outputFile=test-results.json 2>&1 || true
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── Parse test results ──
            let results = null;
            let passed = false;
            if (fs.existsSync('test-results.json')) {
              try {
                results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
                passed = results.success;
              } catch {}
            }

            const icon = passed ? '✅' : '❌';
            const status = passed ? 'passed' : 'failed';

            // ── Build per-file table ──
            let table = '';
            if (results?.testResults) {
              const rows = results.testResults.map(f => {
                const name = f.name.replace(/^.*src\/test\//, '');
                const total = f.assertionResults?.length ?? 0;
                const pass = f.assertionResults?.filter(t => t.status === 'passed').length ?? 0;
                const fail = total - pass;
                const duration = ((f.endTime - f.startTime) / 1000).toFixed(2);
                const fileStatus = fail > 0 ? '❌' : '✅';
                return `| ${fileStatus} | \`${name}\` | ${pass} | ${fail} | ${duration}s |`;
              });

              const totalTests = results.numTotalTests ?? 0;
              const passedTests = results.numPassedTests ?? 0;
              const failedTests = results.numFailedTests ?? 0;

              table = [
                '',
                `**${passedTests}** passed, **${failedTests}** failed, **${totalTests}** total`,
                '',
                '| | File | Passed | Failed | Duration |',
                '|---|------|--------|--------|----------|',
                ...rows,
              ].join('\n');
            }

            // ── Fetch all PR comments once ──
            const { data: allComments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // ── Get Vercel deployment info from bot comment ──
            let vercelSection = '';
            try {
              const vcComment = allComments.find(c =>
                c.user.login === 'vercel[bot]' && c.body.includes('[vc]')
              );
              if (vcComment) {
                const b64Match = vcComment.body.match(/\[vc\]:\s*#[^:]+:(\S+)/);
                if (b64Match) {
                  const data = JSON.parse(Buffer.from(b64Match[1], 'base64').toString());
                  const project = data.projects?.[0];
                  if (project) {
                    const previewUrl = `https://${project.previewUrl}`;
                    const inspectorUrl = project.inspectorUrl;
                    const deployStatus = project.nextCommitStatus === 'DEPLOYED' ? '✅ Ready' : '⏳ Building';
                    vercelSection = [
                      '',
                      '### Deployment',
                      '',
                      '| | |',
                      '|---|---|',
                      `| **Status** | ${deployStatus} |`,
                      `| **Preview** | [${project.previewUrl}](${previewUrl}) |`,
                      `| **Deployment** | [View on Vercel](${inspectorUrl}) |`,
                      '',
                    ].join('\n');
                  }
                }
              }
            } catch {}

            // ── Compose comment ──
            const body = [
              `## ${icon} API Tests ${status}`,
              vercelSection,
              table,
              '',
            ].join('\n');

            // ── Upsert: update existing comment or create new one ──
            const existing = allComments.find(c =>
              c.user.type === 'Bot' && c.body.includes('API Tests')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if tests failed
        if: steps.tests.outputs.exit_code != '0'
        run: exit 1
